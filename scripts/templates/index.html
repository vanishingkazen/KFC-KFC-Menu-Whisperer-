<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍰 餐品推荐系统 - 测试后台</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #FFF5F5 0%, #FFF0F7 50%, #F5F0FF 100%);
            min-height: 100vh;
            color: #5D4E6D;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FF6B9D, #C44569, #FF6B9D);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .header p {
            color: #8B7B9B;
            font-size: 1.1rem;
        }

        /* Cards */
        .card {
            background: white;
            border-radius: 24px;
            padding: 28px;
            margin-bottom: 24px;
            box-shadow: 0 8px 32px rgba(200, 150, 200, 0.15);
            border: 2px solid rgba(255, 107, 157, 0.1);
        }

        .card-title {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            font-size: 1.3rem;
            font-weight: 600;
            color: #C44569;
        }

        .card-title .icon {
            font-size: 1.5rem;
        }

        /* Table */
        .combo-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin-top: 15px;
            overflow: hidden;
            border-radius: 16px;
        }

        .combo-table thead th {
            background: linear-gradient(135deg, #FF6B9D, #FF8FB1);
            color: white;
            padding: 16px 12px;
            font-weight: 500;
            text-align: left;
        }

        .combo-table thead th:first-child {
            border-radius: 16px 0 0 0;
        }

        .combo-table thead th:last-child {
            border-radius: 0 16px 0 0;
        }

        .combo-table tbody tr {
            transition: all 0.2s ease;
        }

        .combo-table tbody tr:hover {
            background: rgba(255, 107, 157, 0.05);
        }

        .combo-table tbody td {
            padding: 14px 12px;
            border-bottom: 1px solid rgba(200, 150, 200, 0.1);
        }

        .combo-table tbody tr:last-child td:first-child {
            border-radius: 0 0 0 16px;
        }

        .combo-table tbody tr:last-child td:last-child {
            border-radius: 0 0 16px 0;
        }

        .combo-table tbody tr:last-child td {
            border-bottom: none;
        }

        /* Tags */
        .tag {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .tag-pink {
            background: rgba(255, 107, 157, 0.15);
            color: #C44569;
        }

        .tag-green {
            background: rgba(46, 204, 113, 0.15);
            color: #27AE60;
        }

        .tag-yellow {
            background: rgba(241, 196, 15, 0.15);
            color: #D4A500;
        }

        .tag-purple {
            background: rgba(155, 89, 182, 0.15);
            color: #8E44AD;
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .status-on {
            background: rgba(46, 204, 113, 0.15);
            color: #27AE60;
        }

        .status-off {
            background: rgba(189, 195, 199, 0.3);
            color: #7F8C8D;
        }

        /* Buttons */
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .btn-primary {
            background: linear-gradient(135deg, #FF6B9D, #FF8FB1);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 107, 157, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 107, 157, 0.4);
        }

        .btn-secondary {
            background: rgba(155, 89, 182, 0.1);
            color: #8E44AD;
        }

        .btn-secondary:hover {
            background: rgba(155, 89, 182, 0.2);
        }

        .btn-danger {
            background: rgba(231, 76, 60, 0.1);
            color: #E74C3C;
        }

        .btn-danger:hover {
            background: rgba(231, 76, 60, 0.2);
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 0.8rem;
        }

        /* Input */
        .input-group {
            margin-bottom: 16px;
        }

        .input-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: #5D4E6D;
            font-size: 0.9rem;
        }

        .input-group input,
        .input-group textarea,
        .input-group select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid rgba(200, 150, 200, 0.2);
            border-radius: 12px;
            font-size: 0.95rem;
            font-family: inherit;
            transition: all 0.2s ease;
            background: rgba(255, 255, 255, 0.8);
        }

        .input-group input:focus,
        .input-group textarea:focus,
        .input-group select:focus {
            outline: none;
            border-color: #FF6B9D;
            box-shadow: 0 0 0 4px rgba(255, 107, 157, 0.1);
        }

        /* Test Section */
        .test-input-wrapper {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .test-input-wrapper input {
            flex: 1;
            padding: 16px 20px;
            border: 2px solid rgba(255, 107, 157, 0.2);
            border-radius: 16px;
            font-size: 1rem;
            transition: all 0.2s ease;
        }

        .test-input-wrapper input:focus {
            outline: none;
            border-color: #FF6B9D;
            box-shadow: 0 0 0 4px rgba(255, 107, 157, 0.1);
        }

        .test-btn {
            padding: 16px 32px;
            background: linear-gradient(135deg, #FF6B9D, #FF8FB1);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(255, 107, 157, 0.35);
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .test-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(255, 107, 157, 0.45);
        }

        .test-btn:active {
            transform: translateY(0);
        }

        /* Loading */
        #loading {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 107, 157, 0.1);
            border-top-color: #FF6B9D;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: #8B7B9B;
            font-size: 1rem;
        }

        /* Response Area */
        .response-area {
            background: linear-gradient(135deg, #FFF5F8, #FFF0F7);
            border: 2px dashed rgba(255, 107, 157, 0.3);
            border-radius: 20px;
            padding: 24px;
            margin-top: 20px;
        }

        .response-area:empty {
            display: none;
        }

        /* Route Badge */
        .route-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 24px;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .route-perfect {
            background: linear-gradient(135deg, rgba(46, 204, 113, 0.15), rgba(39, 174, 96, 0.15));
            color: #27AE60;
            border: 2px solid rgba(46, 204, 113, 0.3);
        }

        .route-fallback {
            background: linear-gradient(135deg, rgba(241, 196, 15, 0.15), rgba(230, 180, 0, 0.15));
            color: #D4A500;
            border: 2px solid rgba(241, 196, 15, 0.3);
        }

        .route-nomatch {
            background: linear-gradient(135deg, rgba(231, 76, 60, 0.15), rgba(192, 57, 43, 0.15));
            color: #E74C3C;
            border: 2px solid rgba(231, 76, 60, 0.3);
        }

        /* Demand Tags */
        .demand-tag {
            display: inline-block;
            background: linear-gradient(135deg, #C44569, #D4658A);
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            margin: 4px;
            box-shadow: 0 2px 8px rgba(196, 69, 105, 0.25);
        }

        /* Match Card */
        .match-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin: 16px 0;
            border: 2px solid;
            transition: all 0.2s ease;
        }

        .match-card.perfect {
            border-color: rgba(46, 204, 113, 0.3);
            background: linear-gradient(135deg, rgba(46, 204, 113, 0.05), rgba(255, 255, 255, 1));
        }

        .match-card.partial {
            border-color: rgba(241, 196, 15, 0.3);
            background: linear-gradient(135deg, rgba(241, 196, 15, 0.05), rgba(255, 255, 255, 1));
        }

        .match-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
        }

        .match-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .match-name {
            font-size: 1.2rem;
            font-weight: 600;
            color: #5D4E6D;
        }

        .match-score {
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .match-score.full {
            background: linear-gradient(135deg, #2ECC71, #27AE60);
            color: white;
        }

        .match-score.partial {
            background: linear-gradient(135deg, #F39C12, #E67E22);
            color: white;
        }

        .match-detail {
            margin: 8px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .demand-check {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            flex-shrink: 0;
        }

        .demand-check.pass {
            background: linear-gradient(135deg, #2ECC71, #27AE60);
            color: white;
        }

        .demand-check.fail {
            background: linear-gradient(135deg, #E74C3C, #C0392B);
            color: white;
        }

        .demand-text {
            color: #5D4E6D;
        }

        .demand-reason {
            color: #8B7B9B;
            font-size: 0.85rem;
            margin-left: 30px;
        }

        .unmet-reasons {
            margin-top: 12px;
            padding: 12px;
            background: rgba(231, 76, 60, 0.08);
            border-radius: 12px;
            color: #E74C3C;
            font-size: 0.9rem;
        }

        /* Final Response */
        .final-response {
            background: linear-gradient(135deg, #FF6B9D, #C44569);
            color: white;
            padding: 24px;
            border-radius: 20px;
            margin-top: 24px;
            font-size: 1.05rem;
            line-height: 1.8;
            box-shadow: 0 8px 30px rgba(196, 69, 105, 0.3);
        }

        .final-response-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            margin-bottom: 12px;
            font-size: 1.1rem;
        }

        .final-response-content {
            white-space: pre-wrap;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(93, 78, 109, 0.5);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            border-radius: 24px;
            padding: 32px;
            max-width: 520px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(93, 78, 109, 0.3);
            animation: modalSlideIn 0.3s ease;
        }

        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .modal-header h3 {
            font-size: 1.3rem;
            color: #C44569;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .modal-close {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(200, 150, 200, 0.1);
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            color: #8B7B9B;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            background: rgba(231, 76, 60, 0.1);
            color: #E74C3C;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #8B7B9B;
        }

        .empty-state .icon {
            font-size: 3rem;
            margin-bottom: 12px;
        }

        /* Section Divider */
        .section-title {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 30px 0 20px;
            font-size: 1.1rem;
            color: #8B7B9B;
        }

        .section-title::after {
            content: '';
            flex: 1;
            height: 2px;
            background: linear-gradient(90deg, rgba(200, 150, 200, 0.2), transparent);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .test-input-wrapper {
                flex-direction: column;
            }

            .test-btn {
                width: 100%;
                justify-content: center;
            }

            .combo-table {
                font-size: 0.85rem;
            }

            .combo-table th,
            .combo-table td {
                padding: 10px 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🍰 餐品推荐系统</h1>
            <p>✨ 智能推荐 · 贴心服务 · 美味相伴 ✨</p>
        </div>

        <div class="card">
            <div class="card-title">
                <span class="icon">🍽️</span>
                <span>套餐管理</span>
            </div>
            <button class="btn btn-primary" onclick="openAddModal()">
                <span>✨</span> 添加套餐
            </button>
            <table class="combo-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>套餐名称</th>
                        <th>单品</th>
                        <th>标签</th>
                        <th>热量</th>
                        <th>状态</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="combosBody">
                    <tr>
                        <td colspan="7">
                            <div class="empty-state">
                                <div class="icon">🍕</div>
                                <div>加载中...</div>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="card">
            <div class="card-title">
                <span class="icon">🧪</span>
                <span>测试工作流</span>
            </div>

            <div class="test-input-wrapper">
                <input type="text" id="userInput" placeholder="输入您的需求，比如：我要一份带圣代的减脂餐，不要油炸物~"
                       onkeypress="if(event.key==='Enter') testWorkflow()">
                <button class="test-btn" onclick="testWorkflow()">
                    <span>🚀</span> 开始测试
                </button>
            </div>

            <div id="loading">
                <div class="spinner"></div>
                <div class="loading-text">小正在努力思考中...</div>
            </div>

            <div id="responseArea"></div>
        </div>
    </div>

    <!-- Add Modal -->
    <div id="addModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><span>✨</span> 添加套餐</h3>
                <button class="modal-close" onclick="closeModal('addModal')">&times;</button>
            </div>
            <div class="input-group">
                <label>套餐名称</label>
                <input type="text" id="addName" placeholder="比如：香煎鸡胸肉套餐">
            </div>
            <div class="input-group">
                <label>单品（用逗号分隔）</label>
                <input type="text" id="addItems" placeholder="比如：煎鸡胸,水煮西兰花,原味圣代">
            </div>
            <div class="input-group">
                <label>标签（用逗号分隔）</label>
                <input type="text" id="addTags" placeholder="比如：高蛋白,非油炸,减脂">
            </div>
            <div class="input-group">
                <label>热量（大卡）</label>
                <input type="number" id="addCalories" placeholder="比如：580">
            </div>
            <div class="input-group">
                <label>销量</label>
                <input type="number" id="addSales" placeholder="比如：1000">
            </div>
            <button class="btn btn-primary" style="width:100%;padding:14px;" onclick="addCombo()">
                <span>✨</span> 保存套餐
            </button>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><span>✏️</span> 编辑套餐</h3>
                <button class="modal-close" onclick="closeModal('editModal')">&times;</button>
            </div>
            <input type="hidden" id="editId">
            <div class="input-group">
                <label>套餐名称</label>
                <input type="text" id="editName">
            </div>
            <div class="input-group">
                <label>单品（用逗号分隔）</label>
                <input type="text" id="editItems">
            </div>
            <div class="input-group">
                <label>标签（用逗号分隔）</label>
                <input type="text" id="editTags">
            </div>
            <div class="input-group">
                <label>热量（大卡）</label>
                <input type="number" id="editCalories">
            </div>
            <div class="input-group">
                <label>销量</label>
                <input type="number" id="editSales">
            </div>
            <div class="input-group">
                <label>状态</label>
                <select id="editStatus">
                    <option value="on_shelf">✨ 上架</option>
                    <option value="off_shelf">💤 下架</option>
                </select>
            </div>
            <button class="btn btn-primary" style="width:100%;padding:14px;" onclick="updateCombo()">
                <span>💾</span> 保存修改
            </button>
        </div>
    </div>

    <script>
        let currentEditId = null;

        async function loadCombos() {
            try {
                const response = await fetch('/api/combos');
                const combos = await response.json();
                const tbody = document.getElementById('combosBody');

                if (combos.length === 0) {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="7">
                                <div class="empty-state">
                                    <div class="icon">🍕</div>
                                    <div>暂无套餐数据，试试添加一个吧~</div>
                                </div>
                            </td>
                        </tr>`;
                    return;
                }

                tbody.innerHTML = combos.map(combo => `
                    <tr>
                        <td><strong>${combo.combo_id}</strong></td>
                        <td>${combo.combo_name}</td>
                        <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;">${combo.items}</td>
                        <td>${combo.tags.split(',').map(t => `<span class="tag tag-pink">${t.trim()}</span>`).join(' ')}</td>
                        <td><span class="tag tag-yellow">🔥 ${combo.calories}大卡</span></td>
                        <td><span class="status-badge ${combo.status === 'on_shelf' ? 'status-on' : 'status-off'}">${combo.status === 'on_shelf' ? '✨ 上架' : '💤 下架'}</span></td>
                        <td>
                            <button class="btn btn-secondary btn-sm" onclick="openEditModal(${combo.combo_id})">✏️</button>
                            <button class="btn btn-danger btn-sm" onclick="deleteCombo(${combo.combo_id})">🗑️</button>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error('加载失败:', error);
            }
        }

        function openAddModal() {
            document.getElementById('addModal').style.display = 'flex';
        }

        async function openEditModal(id) {
            currentEditId = id;
            try {
                const response = await fetch(`/api/combos/${id}`);
                const combo = await response.json();

                document.getElementById('editId').value = combo.combo_id;
                document.getElementById('editName').value = combo.combo_name;
                document.getElementById('editItems').value = combo.items;
                document.getElementById('editTags').value = combo.tags;
                document.getElementById('editCalories').value = combo.calories;
                document.getElementById('editSales').value = combo.sales_volume;
                document.getElementById('editStatus').value = combo.status;

                document.getElementById('editModal').style.display = 'flex';
            } catch (error) {
                alert('加载失败: ' + error);
            }
        }

        function closeModal(id) {
            document.getElementById(id).style.display = 'none';
        }

        async function addCombo() {
            const name = document.getElementById('addName').value.trim();
            const items = document.getElementById('addItems').value.trim();
            const tags = document.getElementById('addTags').value.trim();
            const calories = parseInt(document.getElementById('addCalories').value) || 0;
            const sales = parseInt(document.getElementById('addSales').value) || 0;

            if (!name || !items || !tags) {
                alert('请填写完整信息哦~');
                return;
            }

            try {
                const response = await fetch('/api/combos', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        combo_name: name,
                        items: items,
                        tags: tags,
                        calories: calories,
                        sales_volume: sales
                    })
                });

                if (response.ok) {
                    alert('添加成功啦~ ✨');
                    closeModal('addModal');
                    loadCombos();
                    ['addName', 'addItems', 'addTags', 'addCalories', 'addSales'].forEach(id => {
                        document.getElementById(id).value = '';
                    });
                } else {
                    const error = await response.json();
                    alert('添加失败: ' + error.error);
                }
            } catch (error) {
                alert('添加失败: ' + error);
            }
        }

        async function updateCombo() {
            const id = document.getElementById('editId').value;
            const name = document.getElementById('editName').value.trim();
            const items = document.getElementById('editItems').value.trim();
            const tags = document.getElementById('editTags').value.trim();
            const calories = parseInt(document.getElementById('editCalories').value) || 0;
            const sales = parseInt(document.getElementById('editSales').value) || 0;
            const status = document.getElementById('editStatus').value;

            try {
                const response = await fetch(`/api/combos/${id}`, {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        combo_name: name,
                        items: items,
                        tags: tags,
                        calories: calories,
                        sales_volume: sales,
                        status: status
                    })
                });

                if (response.ok) {
                    alert('更新成功啦~ ✨');
                    closeModal('editModal');
                    loadCombos();
                } else {
                    const error = await response.json();
                    alert('更新失败: ' + error.error);
                }
            } catch (error) {
                alert('更新失败: ' + error);
            }
        }

        async function deleteCombo(id) {
            if (!confirm('确定要删除这个套餐吗？')) return;

            try {
                const response = await fetch(`/api/combos/${id}`, {method: 'DELETE'});
                if (response.ok) {
                    alert('删除成功~');
                    loadCombos();
                } else {
                    const error = await response.json();
                    alert('删除失败: ' + error.error);
                }
            } catch (error) {
                alert('删除失败: ' + error);
            }
        }

        async function testWorkflow() {
            const userInput = document.getElementById('userInput').value.trim();
            if (!userInput) {
                alert('请输入您的需求哦~');
                return;
            }

            const loading = document.getElementById('loading');
            const responseArea = document.getElementById('responseArea');

            loading.style.display = 'block';
            responseArea.innerHTML = '';

            try {
                const response = await fetch('/api/test', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({user_input: userInput})
                });

                const result = await response.json();

                if (result.error) {
                    responseArea.innerHTML = `<div style="color:#E74C3C;padding:20px;">😢 出错了：${result.error}</div>`;
                } else {
                    renderResult(result);
                }
            } catch (error) {
                responseArea.innerHTML = `<div style="color:#E74C3C;padding:20px;">😢 请求失败：${error}</div>`;
            } finally {
                loading.style.display = 'none';
            }
        }

        function renderResult(result) {
            let html = '';

            // Route Badge
            const routeIcons = {
                'perfect_match': '🎉',
                'fallback': '🤔',
                'no_match': '😢'
            };
            const routeLabels = {
                'perfect_match': '完美匹配',
                'fallback': '妥协推荐',
                'no_match': '无匹配'
            };
            const routeClass = result.route_decision;

            html += `<div style="margin-bottom:20px;">
                <div style="color:#8B7B9B;margin-bottom:8px;">💬 ${result.user_input}</div>
                <span class="route-badge route-${routeClass}">${routeIcons[routeClass]} ${routeLabels[routeClass]}</span>
            </div>`;

            // Calorie Range
            if (result.calorie_range) {
                html += `<div style="margin-bottom:16px;color:#5D4E6D;">
                    🔥 热量范围：<strong>${result.calorie_range.lower_bound} - ${result.calorie_range.upper_bound}</strong> 大卡
                    ${result.target_calorie ? `(目标: ${result.target_calorie}大卡)` : ''}
                </div>`;
            }

            // Demands
            if (result.demands && result.demands.length > 0) {
                html += `<div class="section-title">✨ 提取的需求</div>`;
                html += result.demands.map(d => `<span class="demand-tag">${d.content}</span>`).join('');
            }

            // Match Summary
            html += `<div style="margin-top:20px;">
                📊 召回候选：<strong>${result.combos_count}</strong> 个
            </div>`;

            // Perfect Matches
            if (result.perfect_matches && result.perfect_matches.length > 0) {
                html += `<div class="section-title">🎯 完美匹配</div>`;
                result.perfect_matches.forEach(combo => {
                    html += renderMatchCard(combo, 'perfect');
                });
            }

            // Partial Matches
            if (result.partial_matches && result.partial_matches.length > 0) {
                html += `<div class="section-title">💭 部分匹配</div>`;
                result.partial_matches.forEach(combo => {
                    html += renderMatchCard(combo, 'partial');
                });
            }

            // Final Response
            if (result.final_response) {
                html += `<div class="final-response">
                    <div class="final-response-label">💬 小助手说</div>
                    <div class="final-response-content">${result.final_response}</div>
                </div>`;
            }

            document.getElementById('responseArea').innerHTML = html;
        }

        function renderMatchCard(combo, type) {
            const scoreClass = type === 'perfect' ? 'full' : 'partial';
            const scoreIcon = type === 'perfect' ? '✨' : '💪';
            const cardClass = type === 'perfect' ? 'perfect' : 'partial';

            let resultsHtml = combo.results.map(r => `
                <div class="match-detail">
                    <span class="demand-check ${r.match ? 'pass' : 'fail'}">${r.match ? '✓' : '✗'}</span>
                    <span class="demand-text">${r.demand}</span>
                </div>
                <div class="demand-reason">${r.reason}</div>
            `).join('');

            let unmetHtml = '';
            if (combo.unmet_reasons && combo.unmet_reasons.length > 0) {
                unmetHtml = `<div class="unmet-reasons">😢 ${combo.unmet_reasons.join(', ')}</div>`;
            }

            return `<div class="match-card ${cardClass}">
                <div class="match-header">
                    <span class="match-name">🍽️ ${combo.combo_name}</span>
                    <span class="match-score ${scoreClass}">${scoreIcon} ${combo.score}/${combo.total_demands}</span>
                </div>
                ${resultsHtml}
                ${unmetHtml}
            </div>`;
        }

        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) {
                event.target.style.display = 'none';
            }
        }

        loadCombos();
    </script>
</body>
</html>
