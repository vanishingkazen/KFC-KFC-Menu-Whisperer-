<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>餐品推荐系统</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Google Sans', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #ffffff;
            color: #202124;
            line-height: 1.58;
            font-size: 14px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* Header */
        .header {
            border-bottom: 1px solid #e0e0e0;
            padding: 16px 0;
            background: #ffffff;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h1 {
            font-size: 1.25rem;
            font-weight: 500;
            color: #202124;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #4285F4, #34A853);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1rem;
        }

        .header-links {
            display: flex;
            gap: 24px;
        }

        .header-links a {
            color: #5f6368;
            text-decoration: none;
            font-size: 0.875rem;
        }

        .header-links a:hover {
            color: #4285F4;
        }

        /* Search Section */
        .search-section {
            padding: 48px 0 32px;
            text-align: center;
        }

        .search-logo {
            margin-bottom: 32px;
        }

        .search-logo h1 {
            font-size: 2.5rem;
            font-weight: 400;
            color: #202124;
        }

        .search-logo span {
            color: #4285F4;
        }

        .search-box {
            max-width: 600px;
            margin: 0 auto;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 14px 20px;
            padding-left: 48px;
            font-size: 1rem;
            border: 1px solid #dfe1e5;
            border-radius: 24px;
            outline: none;
            transition: box-shadow 0.2s;
            font-family: inherit;
        }

        .search-input:focus {
            box-shadow: 0 1px 6px rgba(32, 33, 36, 0.28);
        }

        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #9aa0a6;
        }

        .search-btn {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: #4285F4;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            font-family: inherit;
        }

        .search-btn:hover {
            background: #3367d6;
        }

        /* Results Section */
        .results-section {
            padding: 24px 0;
        }

        .result-card {
            background: #ffffff;
            border: 1px solid #dfe1e5;
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 16px;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
        }

        .result-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid #e0e0e0;
        }

        .result-query {
            flex: 1;
            color: #202124;
            font-size: 1rem;
        }

        .result-query strong {
            color: #4285F4;
        }

        .route-badge {
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .route-perfect {
            background: #e6f4ea;
            color: #137333;
        }

        .route-fallback {
            background: #fef7e0;
            color: #b05a00;
        }

        .route-nomatch {
            background: #fce8e6;
            color: #c5221f;
        }

        /* Match Cards */
        .match-cards {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .match-card {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 16px;
            display: flex;
            align-items: flex-start;
            gap: 16px;
        }

        .match-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            flex-shrink: 0;
        }

        .match-icon.perfect {
            background: #e6f4ea;
        }

        .match-icon.partial {
            background: #fef7e0;
        }

        .match-content {
            flex: 1;
        }

        .match-name {
            font-weight: 500;
            color: #202124;
            margin-bottom: 8px;
        }

        .match-details {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 8px;
        }

        .match-tag {
            background: #e8eaed;
            color: #5f6368;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
        }

        .match-calories {
            color: #ea4335;
            font-weight: 500;
            font-size: 0.875rem;
        }

        .demand-list {
            margin-top: 12px;
        }

        .demand-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 0;
            font-size: 0.875rem;
        }

        .demand-icon {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            flex-shrink: 0;
        }

        .demand-icon.pass {
            background: #137333;
            color: white;
        }

        .demand-icon.fail {
            background: #c5221f;
            color: white;
        }

        .demand-text {
            color: #5f6368;
        }

        .demand-reason {
            color: #9aa0a6;
            font-size: 0.75rem;
            margin-left: 26px;
        }

        /* Final Response */
        .final-response {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px 24px;
            margin-top: 20px;
            border-left: 4px solid #4285F4;
        }

        .final-response-label {
            color: #5f6368;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .final-response-content {
            color: #202124;
            line-height: 1.7;
            white-space: pre-wrap;
        }

        /* Demands Section */
        .demands-section {
            margin-top: 16px;
        }

        .demands-label {
            color: #5f6368;
            font-size: 0.75rem;
            margin-bottom: 8px;
        }

        .demands-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .demand-tag {
            background: #e8f0fe;
            color: #1967d2;
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 0.875rem;
        }

        /* Stats */
        .stats {
            display: flex;
            gap: 24px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #e0e0e0;
        }

        .stat-item {
            color: #5f6368;
            font-size: 0.875rem;
        }

        .stat-value {
            color: #202124;
            font-weight: 500;
        }

        /* Loading */
        #loading {
            display: none;
            text-align: center;
            padding: 60px;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #dfe1e5;
            border-top-color: #4285F4;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px;
            color: #5f6368;
        }

        .empty-icon {
            font-size: 3rem;
            margin-bottom: 16px;
        }

        /* Card Section */
        .card-section {
            padding: 32px 0;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 1.25rem;
            font-weight: 500;
            color: #202124;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 4px;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            border: none;
            font-family: inherit;
        }

        .btn-primary {
            background: #4285F4;
            color: white;
        }

        .btn-primary:hover {
            background: #3367d6;
        }

        .btn-secondary {
            background: #ffffff;
            color: #4285F4;
            border: 1px solid #dfe1e5;
        }

        .btn-secondary:hover {
            background: #f8f9fa;
        }

        .btn-danger {
            background: #ffffff;
            color: #c5221f;
            border: 1px solid #dfe1e5;
        }

        .btn-danger:hover {
            background: #fce8e6;
        }

        /* Table */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            background: #ffffff;
            border: 1px solid #dfe1e5;
            border-radius: 8px;
            overflow: hidden;
        }

        .data-table th {
            background: #f8f9fa;
            color: #5f6368;
            font-weight: 500;
            text-align: left;
            padding: 12px 16px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid #dfe1e5;
        }

        .data-table td {
            padding: 12px 16px;
            border-bottom: 1px solid #e0e0e0;
            color: #202124;
            font-size: 0.875rem;
        }

        .data-table tr:last-child td {
            border-bottom: none;
        }

        .data-table tr:hover {
            background: #f8f9fa;
        }

        .tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            margin-right: 4px;
        }

        .tag-blue {
            background: #e8f0fe;
            color: #1967d2;
        }

        .tag-green {
            background: #e6f4ea;
            color: #137333;
        }

        .tag-yellow {
            background: #fef7e0;
            color: #b05a00;
        }

        .status-badge {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .status-on {
            background: #e6f4ea;
            color: #137333;
        }

        .status-off {
            background: #e8eaed;
            color: #5f6368;
        }

        .action-btn {
            padding: 6px 12px;
            font-size: 0.75rem;
            margin-right: 4px;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            border-radius: 8px;
            padding: 28px;
            max-width: 480px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 7px 12px rgba(0, 0, 0, 0.15);
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .modal-header h3 {
            font-size: 1.25rem;
            font-weight: 500;
            color: #202124;
        }

        .modal-close {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 1.25rem;
            color: #5f6368;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            background: #f1f3f4;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 24px;
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-group label {
            display: block;
            margin-bottom: 6px;
            color: #5f6368;
            font-size: 0.875rem;
            font-weight: 500;
        }

        .input-group input,
        .input-group select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #dfe1e5;
            border-radius: 4px;
            font-size: 0.875rem;
            font-family: inherit;
            outline: none;
        }

        .input-group input:focus,
        .input-group select:focus {
            border-color: #4285F4;
            box-shadow: 0 0 0 2px rgba(66, 133, 244, 0.2);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-links {
                display: none;
            }

            .search-logo h1 {
                font-size: 1.75rem;
            }

            .data-table {
                font-size: 0.8rem;
            }

            .data-table th,
            .data-table td {
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container header-content">
            <h1>
                <span class="header-icon">🍽️</span>
                餐品推荐系统
            </h1>
            <nav class="header-links">
                <a href="#combos">套餐管理</a>
                <a href="#test">测试</a>
            </nav>
        </div>
    </header>

    <main>
        <section class="search-section" id="test">
            <div class="container">
                <div class="search-logo">
                    <h1><span>餐品</span>推荐</h1>
                </div>
                <div class="search-box">
                    <span class="search-icon">🔍</span>
                    <input type="text" class="search-input" id="userInput" placeholder="输入您的需求，比如：一份600大卡的减脂套餐" onkeypress="if(event.key==='Enter') testWorkflow()">
                    <button class="search-btn" onclick="testWorkflow()">推荐</button>
                </div>
            </div>
        </section>

        <section class="results-section">
            <div class="container">
                <div id="loading">
                    <div class="loading-spinner"></div>
                    <div>正在分析中...</div>
                </div>
                <div id="responseArea"></div>
            </div>
        </section>

        <section class="card-section" id="combos">
            <div class="container">
                <div class="section-header">
                    <h2 class="section-title">套餐管理</h2>
                    <button class="btn btn-primary" onclick="openAddModal()">添加套餐</button>
                </div>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>套餐名称</th>
                            <th>单品</th>
                            <th>标签</th>
                            <th>热量</th>
                            <th>状态</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="combosBody">
                        <tr>
                            <td colspan="7">
                                <div class="empty-state">加载中...</div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- Add Modal -->
    <div id="addModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>添加套餐</h3>
                <button class="modal-close" onclick="closeModal('addModal')">&times;</button>
            </div>
            <div class="input-group">
                <label>套餐名称</label>
                <input type="text" id="addName" placeholder="比如：香煎鸡胸肉套餐">
            </div>
            <div class="input-group">
                <label>单品（用逗号分隔）</label>
                <input type="text" id="addItems" placeholder="比如：煎鸡胸,水煮西兰花,原味圣代">
            </div>
            <div class="input-group">
                <label>标签（用逗号分隔）</label>
                <input type="text" id="addTags" placeholder="比如：高蛋白,非油炸,减脂">
            </div>
            <div class="input-group">
                <label>热量（大卡）</label>
                <input type="number" id="addCalories" placeholder="比如：580">
            </div>
            <div class="input-group">
                <label>销量</label>
                <input type="number" id="addSales" placeholder="比如：1000">
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal('addModal')">取消</button>
                <button class="btn btn-primary" onclick="addCombo()">保存</button>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>编辑套餐</h3>
                <button class="modal-close" onclick="closeModal('editModal')">&times;</button>
            </div>
            <input type="hidden" id="editId">
            <div class="input-group">
                <label>套餐名称</label>
                <input type="text" id="editName">
            </div>
            <div class="input-group">
                <label>单品（用逗号分隔）</label>
                <input type="text" id="editItems">
            </div>
            <div class="input-group">
                <label>标签（用逗号分隔）</label>
                <input type="text" id="editTags">
            </div>
            <div class="input-group">
                <label>热量（大卡）</label>
                <input type="number" id="editCalories">
            </div>
            <div class="input-group">
                <label>销量</label>
                <input type="number" id="editSales">
            </div>
            <div class="input-group">
                <label>状态</label>
                <select id="editStatus">
                    <option value="on_shelf">上架</option>
                    <option value="off_shelf">下架</option>
                </select>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal('editModal')">取消</button>
                <button class="btn btn-primary" onclick="updateCombo()">保存</button>
            </div>
        </div>
    </div>

    <script>
        let currentEditId = null;

        async function loadCombos() {
            try {
                const response = await fetch('/api/combos');
                const combos = await response.json();
                const tbody = document.getElementById('combosBody');

                if (combos.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state">暂无套餐数据</div></td></tr>`;
                    return;
                }

                tbody.innerHTML = combos.map(combo => `
                    <tr>
                        <td>${combo.combo_id}</td>
                        <td><strong>${combo.combo_name}</strong></td>
                        <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;">${combo.items}</td>
                        <td>${combo.tags.split(',').map(t => `<span class="tag tag-blue">${t.trim()}</span>`).join('')}</td>
                        <td><span class="tag tag-yellow">${combo.calories}大卡</span></td>
                        <td><span class="status-badge ${combo.status === 'on_shelf' ? 'status-on' : 'status-off'}">${combo.status === 'on_shelf' ? '上架' : '下架'}</span></td>
                        <td>
                            <button class="btn btn-secondary action-btn" onclick="openEditModal(${combo.combo_id})">编辑</button>
                            <button class="btn btn-danger action-btn" onclick="deleteCombo(${combo.combo_id})">删除</button>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error('加载失败:', error);
            }
        }

        function openAddModal() {
            document.getElementById('addModal').style.display = 'flex';
        }

        async function openEditModal(id) {
            currentEditId = id;
            try {
                const response = await fetch(`/api/combos/${id}`);
                const combo = await response.json();

                document.getElementById('editId').value = combo.combo_id;
                document.getElementById('editName').value = combo.combo_name;
                document.getElementById('editItems').value = combo.items;
                document.getElementById('editTags').value = combo.tags;
                document.getElementById('editCalories').value = combo.calories;
                document.getElementById('editSales').value = combo.sales_volume;
                document.getElementById('editStatus').value = combo.status;

                document.getElementById('editModal').style.display = 'flex';
            } catch (error) {
                alert('加载失败');
            }
        }

        function closeModal(id) {
            document.getElementById(id).style.display = 'none';
        }

        async function addCombo() {
            const name = document.getElementById('addName').value.trim();
            const items = document.getElementById('addItems').value.trim();
            const tags = document.getElementById('addTags').value.trim();
            const calories = parseInt(document.getElementById('addCalories').value) || 0;
            const sales = parseInt(document.getElementById('addSales').value) || 0;

            if (!name || !items || !tags) {
                alert('请填写完整信息');
                return;
            }

            try {
                const response = await fetch('/api/combos', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        combo_name: name,
                        items: items,
                        tags: tags,
                        calories: calories,
                        sales_volume: sales
                    })
                });

                if (response.ok) {
                    closeModal('addModal');
                    loadCombos();
                    ['addName', 'addItems', 'addTags', 'addCalories', 'addSales'].forEach(id => {
                        document.getElementById(id).value = '';
                    });
                }
            } catch (error) {
                alert('添加失败');
            }
        }

        async function updateCombo() {
            const id = document.getElementById('editId').value;
            const name = document.getElementById('editName').value.trim();
            const items = document.getElementById('editItems').value.trim();
            const tags = document.getElementById('editTags').value.trim();
            const calories = parseInt(document.getElementById('editCalories').value) || 0;
            const sales = parseInt(document.getElementById('editSales').value) || 0;
            const status = document.getElementById('editStatus').value;

            try {
                const response = await fetch(`/api/combos/${id}`, {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        combo_name: name,
                        items: items,
                        tags: tags,
                        calories: calories,
                        sales_volume: sales,
                        status: status
                    })
                });

                if (response.ok) {
                    closeModal('editModal');
                    loadCombos();
                }
            } catch (error) {
                alert('更新失败');
            }
        }

        async function deleteCombo(id) {
            if (!confirm('确定要删除这个套餐吗？')) return;

            try {
                const response = await fetch(`/api/combos/${id}`, {method: 'DELETE'});
                if (response.ok) {
                    loadCombos();
                }
            } catch (error) {
                alert('删除失败');
            }
        }

        async function testWorkflow() {
            const userInput = document.getElementById('userInput').value.trim();
            if (!userInput) return;

            const loading = document.getElementById('loading');
            const responseArea = document.getElementById('responseArea');

            loading.style.display = 'block';
            responseArea.innerHTML = '';

            try {
                const response = await fetch('/api/test', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({user_input: userInput})
                });

                const result = await response.json();

                if (result.error) {
                    responseArea.innerHTML = `<div class="result-card" style="color:#c5221f;">出错了：${result.error}</div>`;
                } else {
                    renderResult(result);
                }
            } catch (error) {
                responseArea.innerHTML = `<div class="result-card" style="color:#c5221f;">请求失败</div>`;
            } finally {
                loading.style.display = 'none';
            }
        }

        function renderResult(result) {
            let html = '';

            const routeClass = result.route_decision;
            const routeLabels = {
                'perfect_match': '完美匹配',
                'fallback': '妥协推荐',
                'no_match': '无匹配'
            };

            html += `<div class="result-card">
                <div class="result-header">
                    <div class="result-query">
                        <strong>${result.user_input}</strong>
                    </div>
                    <span class="route-badge route-${routeClass}">${routeLabels[routeClass]}</span>
                </div>`;

            if (result.demands && result.demands.length > 0) {
                html += `<div class="demands-section">
                    <div class="demands-label">提取的需求</div>
                    <div class="demands-tags">
                        ${result.demands.map(d => `<span class="demand-tag">${d.content}</span>`).join('')}
                    </div>
                </div>`;
            }

            html += `<div class="stats">
                <div class="stat-item">热量范围：<span class="stat-value">${result.calorie_range?.lower_bound || 0} - ${result.calorie_range?.upper_bound || 0}</span> 大卡</div>
                <div class="stat-item">召回候选：<span class="stat-value">${result.combos_count || 0}</span> 个</div>
            </div>`;

            const allMatches = [
                ...(result.perfect_matches || []).map(c => ({...c, type: 'perfect'})),
                ...(result.partial_matches || []).map(c => ({...c, type: 'partial'}))
            ];

            if (allMatches.length > 0) {
                html += `<div class="match-cards" style="margin-top:20px;">`;
                allMatches.forEach(combo => {
                    html += renderMatchCard(combo, combo.type);
                });
                html += `</div>`;
            }

            if (result.final_response) {
                html += `<div class="final-response">
                    <div class="final-response-label">推荐回复</div>
                    <div class="final-response-content">${result.final_response}</div>
                </div>`;
            }

            html += `</div>`;

            document.getElementById('responseArea').innerHTML = html;
        }

        function renderMatchCard(combo, type) {
            const iconClass = type === 'perfect' ? 'perfect' : 'partial';
            const icon = type === 'perfect' ? '✓' : '~';

            let resultsHtml = combo.results.map(r => `
                <div class="demand-item">
                    <span class="demand-icon ${r.match ? 'pass' : 'fail'}">${r.match ? '✓' : '✗'}</span>
                    <span class="demand-text">${r.demand}</span>
                </div>
                ${r.reason ? `<div class="demand-reason">${r.reason}</div>` : ''}
            `).join('');

            return `<div class="match-card">
                <div class="match-icon ${iconClass}">${icon}</div>
                <div class="match-content">
                    <div class="match-name">${combo.combo_name}</div>
                    <div class="match-details">
                        <span class="match-tag">${combo.items?.split(',').slice(0, 3).join(', ')}</span>
                        <span class="match-calories">${combo.combo_name?.includes('素食') ? '' : ''}${combo.score || 0}/${combo.total_demands || 0} 满足</span>
                    </div>
                    <div class="demand-list">
                        ${resultsHtml}
                    </div>
                </div>
            </div>`;
        }

        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) {
                event.target.style.display = 'none';
            }
        }

        loadCombos();
    </script>
</body>
</html>
